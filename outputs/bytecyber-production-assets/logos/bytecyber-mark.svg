  <path class="stream" d="M44 144 C63 120 87 117 111 131 C134 144 149 141 168 116 C183 94 197 77 215 72"/>
  <circle class="node-ring" cx="44" cy="144" r="10" stroke="#50D8AF"/>
  <circle class="node-ring" cx="121" cy="136" r="10" stroke="#39BDEB"/>
  <circle class="node-ring" cx="215" cy="72" r="10" stroke="#6885FF"/>
</svg>
